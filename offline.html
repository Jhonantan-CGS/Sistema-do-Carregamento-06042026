<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cysy Log 360 - Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0b132b,#1e3a8a);font-family:Arial,Helvetica,sans-serif;color:#f8fafc}
    .card{max-width:420px;padding:28px;border-radius:18px;background:rgba(15,23,42,.84);border:1px solid rgba(148,163,184,.35);text-align:center;box-shadow:0 20px 50px rgba(2,6,23,.35)}
    h1{margin:0 0 8px;font-size:22px} p{margin:0;font-size:14px;line-height:1.5;color:#e2e8f0}
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está offline</h1>
    <p>O Cysy Log 360 continuará funcionando com os dados locais. Quando a conexão voltar, atualize para sincronizar.</p>
  </div>
</body>
</html>
