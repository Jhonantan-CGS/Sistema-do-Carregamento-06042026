<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F0F0F">
  <title>Cysy Log 360 - Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 8% 12%,rgba(77,163,255,.20),transparent 26%),radial-gradient(circle at 90% 10%,rgba(0,255,204,.16),transparent 24%),linear-gradient(135deg,#0f0f0f,#191a1f 58%,#10131b);font-family:"Segoe UI",Arial,sans-serif;color:#eaeaea}
    .card{max-width:420px;padding:28px;border-radius:18px;background:rgba(255,255,255,.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.18);text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.05)}
    h1{margin:0 0 8px;font-size:22px;color:#4da3ff;text-shadow:0 0 12px rgba(77,163,255,.38)} p{margin:0;font-size:14px;line-height:1.5;color:#d6dceb}
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está offline</h1>
    <p>O Cysy Log 360 continuará funcionando com os dados locais. Quando a conexão voltar, atualize para sincronizar.</p>
  </div>
</body>
</html>
