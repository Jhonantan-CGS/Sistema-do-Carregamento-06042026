<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08101F">
  <title>Cysy Log 360 - Offline</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 8% 12%,rgba(78,168,255,.22),transparent 26%),radial-gradient(circle at 90% 10%,rgba(140,107,255,.16),transparent 24%),radial-gradient(circle at 50% 100%,rgba(29,233,182,.10),transparent 34%),linear-gradient(155deg,#040816,#08101f 58%,#111a2f);font-family:"Inter","Segoe UI",Arial,sans-serif;color:#f4f7fd}
    .card{max-width:420px;padding:30px;border-radius:24px;background:rgba(10,17,32,.74);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(148,163,184,.18);text-align:center;box-shadow:0 28px 70px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.06)}
    h1{margin:0 0 8px;font-size:24px;color:#f4f7fd;text-shadow:0 0 18px rgba(78,168,255,.18)} p{margin:0;font-size:14px;line-height:1.6;color:#9aaac1}
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está offline</h1>
    <p>O Cysy Log 360 continuará funcionando com os dados locais. Quando a conexão voltar, atualize para sincronizar.</p>
  </div>
</body>
</html>
